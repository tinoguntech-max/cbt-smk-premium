<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - LMS SMKN 1 Kras</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-lg p-8 text-center">
    <div class="mb-6">
      <svg class="w-24 h-24 mx-auto text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414"></path>
      </svg>
    </div>
    
    <h1 class="text-2xl font-bold text-slate-800 mb-2">Tidak Ada Koneksi</h1>
    <p class="text-slate-600 mb-6">
      Anda sedang offline. Periksa koneksi internet Anda dan coba lagi.
    </p>
    
    <div class="space-y-3">
      <button onclick="location.reload()" class="w-full px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl transition-colors">
        Coba Lagi
      </button>
      
      <button onclick="window.history.back()" class="w-full px-6 py-3 bg-slate-200 hover:bg-slate-300 text-slate-800 font-semibold rounded-xl transition-colors">
        Kembali
      </button>
    </div>
    
    <div class="mt-8 pt-6 border-t border-slate-200">
      <p class="text-sm text-slate-500">
        <strong>Tips:</strong> Beberapa halaman yang sudah Anda buka mungkin masih bisa diakses secara offline.
      </p>
    </div>
  </div>
  
  <script>
    // Auto-retry when online
    window.addEventListener('online', () => {
      location.reload();
    });
  </script>
</body>
</html>
